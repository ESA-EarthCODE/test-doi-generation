name: DOI Audit

on:
  pull_request_target:
    branches:
      - main
    paths:
      - 'products/**/collection.json'
      - 'workflows/**/record.json'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.repository_owner == 'esa-earthcode'
    steps:
      - name: Checkout (PR)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Checkout (Manual)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Ensure trusted scripts
        run: |
          git fetch origin main
          git checkout origin/main -- .github/scripts/doi/

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Determine changed files (PR)
        if: github.event_name == 'pull_request_target'
        run: |
          git remote add upstream https://github.com/${{ github.repository }}
          git fetch upstream ${{ github.event.pull_request.base.ref }}
          FILES=$(git diff --name-only upstream/${{ github.event.pull_request.base.ref }} HEAD | grep -E '(products/.*/collection\.json|workflows/.*/record\.json)' || true)
          FILES_FLAT=$(echo $FILES | tr '\n' ' ')
          echo "CHANGED_FILES=$FILES_FLAT" >> $GITHUB_ENV

      - name: Run DOI Draft Generation
        env:
          DATACITE_API_URL: ${{ secrets.DATACITE_API_URL || 'https://api.test.datacite.org' }}
          DATACITE_USER: ${{ secrets.DATACITE_USER }}
          DATACITE_PASSWORD: ${{ secrets.DATACITE_PASSWORD }}
          DATACITE_PREFIX: ${{ secrets.DATACITE_PREFIX }}
          PORTAL_UI_BASE_URL: ${{ vars.PORTAL_UI_BASE_URL || 'https://opensciencedata.esa.int' }}
          CHANGED_FILES: ${{ env.CHANGED_FILES }}
        run: python .github/scripts/doi/generate_drafts.py

      - name: Commit changes to PR
        if: github.event_name == 'pull_request_target'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: assign DOIs to products and workflows"
          file_pattern: 'products/**/collection.json workflows/**/record.json'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Check for changes (Manual)
        if: github.event_name != 'pull_request_target'
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            if [ -f doi_summary.md ]; then
              EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
              echo "PR_BODY<<$EOF" >> $GITHUB_ENV
              cat doi_summary.md >> $GITHUB_ENV
              echo "" >> $GITHUB_ENV
              echo "$EOF" >> $GITHUB_ENV
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request (Manual)
        if: github.event_name != 'pull_request_target' && steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: assign DOIs to products and workflows'
          title: 'chore: assign DOIs (Manual Audit)'
          body: ${{ env.PR_BODY || 'Automated DOI assignment for missing or modified items.' }}
          branch: bot/doi-updates
          base: main
          delete-branch: true
          add-paths: |
            products/**/collection.json
            workflows/**/record.json
          labels: |
            doi-assignment
            automated

name: DOI Draft Cleanup

on:
  pull_request_target:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run if the PR was closed WITHOUT being merged
    if: github.event.pull_request.merged == false && github.repository_owner == 'esa-earthcode'
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Ensure trusted scripts
        run: |
          git fetch origin main
          git checkout origin/main -- .github/scripts/doi/

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Fetch PR and Base branches
        run: |
          git remote add upstream https://github.com/${{ github.repository }}
          # Fetch the base branch
          git fetch upstream ${{ github.event.pull_request.base.ref }}
          # Fetch the PR branch head
          git fetch upstream pull/${{ github.event.pull_request.number }}/head:pr-head

      - name: Run Draft Cleanup
        env:
          DATACITE_API_URL: ${{ secrets.DATACITE_API_URL || 'https://api.test.datacite.org' }}
          DATACITE_USER: ${{ secrets.DATACITE_USER }}
          DATACITE_PASSWORD: ${{ secrets.DATACITE_PASSWORD }}
          DATACITE_PREFIX: ${{ secrets.DATACITE_PREFIX }}
          BASE_REF: upstream/${{ github.event.pull_request.base.ref }}
          HEAD_REF: pr-head
        run: python .github/scripts/doi/cleanup_drafts.py
